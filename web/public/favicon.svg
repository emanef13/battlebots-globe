<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ocean" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#3d8fe8"/>
      <stop offset="55%" stop-color="#1e5fb8"/>
      <stop offset="100%" stop-color="#123f86"/>
    </radialGradient>
    <clipPath id="disc"><circle cx="32" cy="32" r="30"/></clipPath>
  </defs>

  <!-- ocean -->
  <circle cx="32" cy="32" r="30" fill="url(#ocean)"/>

  <!-- land -->
  <g clip-path="url(#disc)" fill="#3faf5c">
    <!-- north america -->
    <path d="M6 14 Q14 8 24 10 Q30 11 28 16 Q26 20 21 22 Q18 27 15 27 Q13 32 10 30 Q5 25 6 14 Z"/>
    <!-- south america -->
    <path d="M18 34 Q23 32 25 37 Q27 43 24 49 Q22 55 19 52 Q16 46 16 40 Q16 36 18 34 Z"/>
    <!-- europe + africa -->
    <path d="M34 12 Q41 9 45 13 Q43 17 40 18 Q45 21 46 27 Q47 34 42 40 Q39 45 37 40 Q34 34 33 28 Q30 22 33 18 Q31 14 34 12 Z"/>
    <!-- asia -->
    <path d="M47 10 Q56 10 60 18 Q62 24 57 27 Q52 30 49 26 Q45 21 46 16 Q45 12 47 10 Z"/>
    <!-- oceania -->
    <path d="M50 42 Q55 40 57 44 Q57 48 53 49 Q49 48 50 42 Z"/>
  </g>

  <!-- polar caps -->
  <g clip-path="url(#disc)" fill="#eef4fb">
    <ellipse cx="30" cy="1" rx="16" ry="5"/>
    <ellipse cx="34" cy="63" rx="18" ry="5"/>
  </g>

  <!-- subtle rim light -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.6"/>
</svg>
